<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * data: gap: content: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
    <script src="components/loader.js"></script>
    <script type="text/javascript" src="js/asoonfunc.js"></script>
    <link rel="stylesheet" href="components/loader.css">
    <link rel="stylesheet" href="css/style.css">
<script>
        document.addEventListener('DOMContentLoaded', () => {
            onLoadFunc();
        });

        function onLoadFunc(){　//起動したら必要な情報を表示をする機能        
            ticketDisply(); 
            limitDisply();
        }

        //チケット表示機能
        function ticketDisply(){
            const stmpCnt = parseInt(localStorage.getItem('stamp') || '0', 10);

            if(stmpCnt < 15) {
                const mainpanelElement = document.getElementById("mainpanel");
                if (mainpanelElement) {
                    mainpanelElement.style.visibility = "hidden";
                }
            } else {
                const ticketCnt = Math.floor(stmpCnt / 15);
                const ticketcountElement = document.getElementById("ticketcount");

                if (ticketcountElement) {
                    if (ticketCnt === 1) {
                        ticketcountElement.style.visibility = "hidden";
                    } else {
                        ticketcountElement.style.visibility = "visible";
                        ticketcountElement.innerHTML = ticketCnt;
                    }
                }
            }
        }

        //有効期限の計算
        function limitDisply(){
            const limitDate = new Date();
            limitDate.setMonth(limitDate.getMonth() + 6);

            const y = limitDate.getFullYear();
            const m = limitDate.getMonth() + 1;
            const d = limitDate.getDate();

            const ticketlimitElement = document.getElementById("ticketlimit");
            if (ticketlimitElement) {
                ticketlimitElement.innerHTML = `${y}年${m}月${d}日まで`;
            }
        }
      
        function ticketClick(){
            if(window.confirm('チケットを使って、ドリンクを購入しますか？')){
                window.location.href = "drink.html?ticket";
            }
        }
    </script>
</head>
<body onLoad="">
<div id="app-container">
<div id="header">
	<img alt="logo" src="img/titlelogo.png" >
</div>
<div class="scroll-area">
<div id="mainpanel" style="visibility:visible; cursor: pointer;" onclick="ticketClick();">
	<img alt="チケット" src="img/ticket.png" width="100%">
	<div id="ticketlimit">XXXX年XX月XX日まで</div>
	<div id="ticketcount" style="visibility:hidden">X</div>

</div>
</div><!-- scroll-area -->
<div id="menudiv">
	<a href="index.html"><img alt="スタンプ" src="img/btnstamp.png"></a>
	<a href="drink.html"><img alt="ジュース購入" src="img/btnbuy.png"></a>
	<a onclick="reset_click();"><img alt="リセット" src="img/btnreset.png"></a>
</div>
</div><!-- app-container -->
</body>

</html>
