<!DOCTYPE html>
<html>

<head>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type">
<title>自動販売機</title>
<link href="css/style.css" rel="stylesheet" type="text/css">
<script type="text/javascript" src="js/asoonfunc.js"></script>
<script>
let ticketFlg = false;

//起動時に所持金を表示する処理
document.addEventListener('DOMContentLoaded', () => {
    onLoadFunc();
});

function onLoadFunc(){
    const nowMoney = parseInt(localStorage.getItem('money') || '0', 10);
    const moneycountElement = document.getElementById("moneycount");
    if (moneycountElement) {
        moneycountElement.innerHTML = `所持金　${nowMoney}円`;
    }
    
    if(window.location.search){
        ticketFlg = true;
    }
}

//自販機でジュースを選んだ時の処理
function drink_click(price, name){
    //チケットを使ったかどうか
    if(ticketFlg === false){  //チケットを使っていないとき               
        
        //現在の所持金を取得
        let nowMoney = parseInt(localStorage.getItem('money') || '0', 10);
        
        //お金が不足していないか確認
        if(nowMoney < price){
            alert("お金が足りません！！！");
            return;
        }
        
        //所持金から金額を引く
        localStorage.setItem('money', nowMoney - price);

        //スタンプを増やす
        stamp_add(name);

    }else{ //チケットを使ったとき
        //現在のスタンプの数を取得
        const nowStamp = parseInt(localStorage.getItem('stamp') || '0', 10);
        //スタンプを－１５して保存する
        localStorage.setItem('stamp', Math.max(0, nowStamp - 15));
        ticketFlg = false;
    }

    alert(`${name}を購入しました`);
    
    //現在の所持金を画面に反映
    const currentMoney = parseInt(localStorage.getItem('money') || '0', 10);
    const moneycountElement = document.getElementById("moneycount");
    if (moneycountElement) {
        moneycountElement.innerHTML = `所持金　${currentMoney}円`;
    }
}

//スタンプを増やす時の処理
function stamp_add(name){
    //現在のスタンプの数を取得
    const nowStamp = parseInt(localStorage.getItem('stamp') || '0', 10);
    
    // キャンペーン：コカコーラなら2倍
    if (name === 'コカコーラ') {
        localStorage.setItem('stamp', nowStamp + 2);
    } else {
        localStorage.setItem('stamp', nowStamp + 1);
    }
}
</script>
<style type="text/css">
</style>
</head>

<body onLoad="">
<div id="app-container">
<div id="header">
	<img alt="logo" src="img/titlelogo.png" >
</div>
<div class="scroll-area">
<div id="drinkpanel">	
	<img alt="自販機" src="img/jihan.png" width="100%" >
	<div class="drinkarea">

    <!--　↓↓↓★★★　ここに商品情報を追加　★★★↓↓↓　-->



	<!--　↑↑↑★★★　ここに商品情報を追加　★★★↑↑↑　-->
	
	</div>
</div>
</div><!-- scroll-area -->
<div id="moneycount">所持金 XXXX円</div>
<div id="menudiv">
	<a href="index.html"><img alt="スタンプ" src="img/btnstamp.png"></a>
	<a href="ticket.html"><img alt="チケット" src="img/btnticket.png"></a>
	<a onclick="reset_click();"><img alt="リセット" src="img/btnreset.png"></a>
</div>
</div><!-- app-container -->
</body>

</html>
