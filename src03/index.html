<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * data: gap: content: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
    <script type="text/javascript" src="js/asoonfunc.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            onLoadFunc();
        });

        const STAMP_MAX = 15;

        function onLoadFunc(){　//起動したらスタンプカードのデータを表示する機能
            stampDisply();
            limitDisply();
            moreDistply();
            pageDisply();
        }

        //スタンプ表示機能
        function stampDisply(){
            const stmpCnt = parseInt(localStorage.getItem('stamp') || '0', 10);
            const stmpDisp = stmpCnt % STAMP_MAX;

            for(let i = 1; i <= stmpDisp; i++){
                const stampElement = document.getElementById("stamp" + i);
                if (stampElement) {
                    stampElement.style.visibility = "visible";
                }
            }
        }

        //有効期限表示機能
        function limitDisply(){
            const limitDate = new Date();
            limitDate.setFullYear(limitDate.getFullYear() + 1);

            const y = limitDate.getFullYear();
            const m = limitDate.getMonth() + 1;
            const d = limitDate.getDate();

            const limitpElement = document.getElementById("limitp");
            if (limitpElement) {
                limitpElement.innerHTML = `有効期限<br>${y}/${m}/${d}`;
            }
        }

        //あと何個表示機能
        function moreDistply(){
            const stmpCnt = parseInt(localStorage.getItem('stamp') || '0', 10);
            const stmpDisp = stmpCnt % STAMP_MAX;
            const moreCnt = STAMP_MAX - stmpDisp;

            const remainCntElement = document.getElementById("remainCnt");
            if (remainCntElement) {
                remainCntElement.innerHTML = moreCnt;
            }
            
            const remaindivElement = document.getElementById("remaindiv");
            if (remaindivElement) {
                remaindivElement.style.visibility="visible";
            }
        }

        //スタンプカードの枚数表示
        function pageDisply(){
            const stmpCnt = parseInt(localStorage.getItem('stamp') || '0', 10);
            const pageCnt = Math.floor(stmpCnt / STAMP_MAX) + 1;

            const pagecntElement = document.getElementById("pagecnt");
            if (pagecntElement) {
                pagecntElement.innerHTML = `${pageCnt}枚目`;
            }
        }
        
        //ボタン１処理
        function btnClick1(){
            window.location.href = "ticket.html";
        }
        
        //ボタン２処理
        function btnClick2(){
            document.body.style.backgroundColor = "#074981";
            const headerElement = document.getElementById('header');
            if (headerElement) {
                headerElement.style.backgroundColor = '#007aba';
            }
        }
        
        //ボタン３処理
        function btnClick3(){
            localStorage.setItem('money', 0);
            alert('現金をすべてをいただきました！！！ケケケケ');
            location.reload();
        }
        
        //ボタン４処理
        function btnClick4(){
            const nowMoney = parseInt(localStorage.getItem('money') || '0', 10);
            localStorage.setItem('money', nowMoney - 150);
            alert('コーラを飲みました。（－ω－　）ｱｻﾞｰｯｽ');
        }
        
        //ボタン５処理
        function btnClick5(){
            if(window.confirm('ドリンクを購入しますか？')){
                window.location.href = "drink.html";
            }
        }
        
        //ボタン６処理
        function btnClick6(){
            localStorage.setItem('stamp', 0);
            alert('スタンプをすべてをいただきました！！！ケケケケ');
            location.reload();
        }
        
        //ボタン７処理
        function btnClick7(){
            if (typeof reset_click === 'function') {
                reset_click();
            }
        }

    </script>

</head>
